<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Onboard — Your Learning Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #f25c95;
      --pink-light: #fef0f6;
      --pink-dark: #c73d78;
      --pink-mid: #f585b5;
      --green: #10b981;
      --green-light: #d1fae5;
      --green-dark: #065f46;
      --amber: #f59e0b;
      --amber-light: #fffbeb;
      --amber-dark: #78350f;
      --blue: #3b82f6;
      --blue-light: #eff6ff;
      --gray-1: #f5f5f5;
      --purple-light: #f5f3ff;
      --bg: #f7f7f7;
      --surface: #ffffff;
      --text: #111111;
      --text-muted: #6b6b6b;
      --border: #e0e0e0;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 22px; font-weight: 800; color: var(--text); text-decoration: none;
    }

    .nav-logo-dot {
      width: 28px; height: 28px;
      background: var(--pink); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 16px; font-weight: 800;
    }

    .nav-title { font-size: 15px; font-weight: 500; color: var(--text-muted); }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── PROFILE CARD ── */
    .profile-card {
      background: #ff7aac;
      border: 2px solid #121117;
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      align-items: center;
      gap: 28px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .profile-card::after {
      content: ''; position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.07); border-radius: 50%;
    }

    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(255,255,255,0.4); border: 3px solid rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; flex-shrink: 0; color: #000;
    }

    .profile-info h1 { font-size: 22px; font-weight: 700; color: #000; margin-bottom: 4px; }
    .profile-info p  { font-size: 14px; color: #333; margin-bottom: 14px; }

    .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; }

    .badge {
      background: rgba(255,255,255,0.35); border: 1px solid rgba(0,0,0,0.12);
      border-radius: 20px; padding: 4px 12px;
      font-size: 13px; font-weight: 600; color: #000;
    }

    .level-badge-hero {
      margin-left: auto; flex-shrink: 0;
      background: rgba(255,255,255,0.9); border: 2px solid rgba(0,0,0,0.1);
      border-radius: 14px; padding: 12px 22px; text-align: center;
    }

    .level-badge-hero-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: #555; margin-bottom: 4px;
    }

    .level-badge-hero-val { font-size: 22px; font-weight: 800; color: #000; }

    /* ── SHARED CARD ── */
    .card {
      background: var(--surface); border-radius: var(--radius);
      padding: 28px; box-shadow: var(--shadow);
    }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }

    .card-title {
      font-size: 16px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }

    .card-title-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }

    .edit-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 12px;
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: border-color 0.15s, color 0.15s;
    }

    .edit-btn:hover { border-color: var(--pink); color: var(--pink); }

    /* ── PREFERENCES ── */
    .preferences-section {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }

    .pref-group-title {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 12px;
    }

    .pref-chips { display: flex; flex-wrap: wrap; gap: 7px; }

    .pref-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 20px;
      font-size: 13px; font-weight: 600; border: 1.5px solid transparent;
    }

    .pref-chip-goal     { background: var(--pink-light);   color: var(--pink-dark); border-color: #f9b8d4; }
    .pref-chip-tutor    { background: var(--blue-light);   color: #1d4ed8;          border-color: #bfdbfe; }
    .pref-chip-schedule { background: var(--purple-light); color: #6d28d9;          border-color: #ddd6fe; }

    /* ── PROFICIENCY CARD ── */
    .proficiency-card {
      background: #e0faf6;
      border-radius: var(--radius);
      padding: 36px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .proficiency-card::before {
      content: ''; position: absolute;
      top: -80px; right: -80px; width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(242,92,149,0.12) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    .proficiency-card::after {
      content: ''; position: absolute;
      bottom: -60px; left: -60px; width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    .proficiency-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 30px; position: relative; z-index: 1;
    }

    .proficiency-title {
      font-size: 20px; font-weight: 700; color: #121117;
      display: flex; align-items: center; gap: 12px;
    }

    .proficiency-title-icon {
      width: 38px; height: 38px;
      background: rgba(242,92,149,0.2); border: 1px solid rgba(242,92,149,0.35);
      border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px;
    }

    .proficiency-title-sub {
      font-size: 14px; color: rgba(18,17,23,0.65); font-weight: 400; margin-top: 3px;
    }

    .overall-level-badge {
      padding: 7px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
    }

    .level-beginner     { background: var(--amber-light); color: #92400e; border: 1px solid #fcd34d; }
    .level-intermediate { background: var(--pink-light);  color: var(--pink-dark); border: 1px solid var(--pink-mid); }
    .level-advanced     { background: var(--green-light); color: var(--green-dark); border: 1px solid #6ee7b7; }

    .skill-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 22px 52px; margin-bottom: 32px;
      position: relative; z-index: 1;
    }

    .skill-row { display: flex; flex-direction: column; gap: 8px; }

    .skill-header { display: flex; align-items: center; justify-content: space-between; }

    .skill-name {
      font-size: 14px; font-weight: 600; color: #121117;
      display: flex; align-items: center; gap: 7px;
    }

    .skill-level-chip {
      font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 20px;
    }

    .bar-track { height: 8px; background: rgba(18,17,23,0.12); border-radius: 999px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 999px; width: 0%; transition: width 1s cubic-bezier(0.4,0,0.2,1); }

    .assessment-insights {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
      border-top: 2px solid rgba(18,17,23,0.15); padding-top: 28px;
      position: relative; z-index: 1;
    }

    .insight-section-title {
      font-size: 14px; font-weight: 700; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }

    .insight-items { display: flex; flex-direction: column; gap: 10px; }

    .insight-item {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 14px; line-height: 1.55;
      background: rgba(255,255,255,0.65); border-radius: 10px;
      padding: 11px 14px;
    }

    .insight-item-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .strengths-title    { color: #065f46; }
    .strengths-item     { border: 1px solid rgba(16,185,129,0.25); }
    .improvements-title { color: #92400e; }
    .improvements-item  { border: 1px solid rgba(245,158,11,0.3); }

    /* ── MOTIVATION CARD ── */
    .motivation-quote {
      font-size: 16px; font-weight: 600; color: var(--text);
      line-height: 1.7; padding: 18px 20px 18px 24px;
      background: var(--pink-light); border-left: 4px solid var(--pink);
      border-radius: 0 10px 10px 0; margin-bottom: 20px;
      font-style: italic; position: relative;
    }

    .motivation-quote::before {
      content: '\201C'; font-size: 52px; color: var(--pink-mid);
      line-height: 0; vertical-align: -18px; margin-right: 4px;
      font-style: normal;
    }

    .motivation-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

    .motivation-tag {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 13px; background: var(--pink-light); color: var(--pink-dark);
      border-radius: 20px; font-size: 13px; font-weight: 600;
    }

    .motivation-meta { display: flex; gap: 14px; flex-wrap: wrap; }

    .motivation-meta-item {
      background: var(--gray-1); border-radius: 10px; padding: 12px 16px;
      font-size: 14px; flex: 1; min-width: 120px;
    }

    .motivation-meta-key {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 4px;
    }

    .motivation-meta-val { font-weight: 700; color: var(--text); font-size: 15px; }

    /* ── TUTOR MATCH ── */
    .match-header-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }

    .match-count-text { font-size: 16px; font-weight: 700; color: var(--text); }
    .match-count-num  { color: var(--pink); font-size: 24px; }

    .tutor-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    .tutor-card {
      background: var(--gray-1); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .tutor-card:hover { box-shadow: var(--shadow-lg); border-color: var(--pink-mid); }

    .tutor-card-top { display: flex; align-items: center; gap: 12px; }

    .tutor-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; flex-shrink: 0; color: white;
    }

    .tutor-name    { font-size: 16px; font-weight: 700; color: var(--text); }
    .tutor-country { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    .tutor-rating { display: flex; align-items: center; gap: 5px; font-size: 14px; }
    .tutor-stars  { color: #f59e0b; font-size: 16px; }
    .tutor-rating-val   { font-weight: 700; }
    .tutor-rating-count { color: var(--text-muted); font-size: 13px; }

    .tutor-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .tutor-tag {
      font-size: 12px; font-weight: 600; padding: 3px 9px;
      border-radius: 20px; background: var(--pink-light); color: var(--pink-dark);
    }

    .tutor-tag-lang { background: var(--blue-light); color: #1d4ed8; }

    .tutor-price     { font-size: 16px; font-weight: 700; color: var(--text); }
    .tutor-price-sub { font-size: 12px; color: var(--text-muted); font-weight: 400; }

    /* ── CTA ── */
    .cta-section {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 52px 24px;
      background: linear-gradient(135deg, #fff0f7, #f0f4ff);
      border-radius: var(--radius); border: 1px solid #f9b8d4;
    }

    .cta-eyebrow {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--pink-dark);
    }

    .cta-btn {
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      color: white; border: none; border-radius: 14px;
      padding: 18px 52px; font-size: 20px; font-weight: 800;
      cursor: pointer; letter-spacing: 0.01em;
      box-shadow: 0 4px 24px rgba(242,92,149,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; gap: 10px;
      font-family: 'Inter', sans-serif;
    }

    .cta-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(242,92,149,0.5); }
    .cta-btn:active { transform: translateY(0); }

    .cta-sub { font-size: 14px; color: var(--text-muted); font-weight: 500; }

    /* ── AVAILABILITY GRID ── */
    .avail-wrapper { margin-top: 18px; }

    .avail-grid {
      display: grid;
      grid-template-columns: 44px repeat(7, 1fr);
      gap: 3px;
      align-items: center;
    }

    .avail-day-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      color: var(--text-muted); text-align: center;
    }

    .avail-row-label {
      font-size: 9px; font-weight: 600; color: var(--text-muted);
      text-align: right; padding-right: 6px;
    }

    .avail-slot {
      height: 20px; border-radius: 4px; background: var(--border);
    }

    .avail-slot.active { background: var(--pink); opacity: 0.8; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .preferences-section  { grid-template-columns: 1fr 1fr; }
      .tutor-cards          { grid-template-columns: 1fr 1fr; }
      .assessment-insights  { grid-template-columns: 1fr; }
      .skill-grid           { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .profile-card     { flex-direction: column; text-align: center; }
      .profile-badges   { justify-content: center; }
      .level-badge-hero { margin-left: 0; }
      .preferences-section { grid-template-columns: 1fr; }
      .tutor-cards      { grid-template-columns: 1fr; }
      main              { padding: 16px 12px 60px; }
      .proficiency-card { padding: 24px 16px; }
      .proficiency-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .profile-card        { animation: fadeUp 0.5s ease both; animation-delay: 0.00s; }
    .preferences-section { animation: fadeUp 0.5s ease both; animation-delay: 0.07s; }
    .proficiency-card    { animation: fadeUp 0.5s ease both; animation-delay: 0.14s; }
    .motivation-card     { animation: fadeUp 0.5s ease both; animation-delay: 0.20s; }
    .match-card          { animation: fadeUp 0.5s ease both; animation-delay: 0.26s; }
    .cta-section         { animation: fadeUp 0.5s ease both; animation-delay: 0.32s; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">
    <div class="nav-logo-dot">P</div>
    Smart Onboard
  </a>
  <span class="nav-title">Your Learning Profile</span>
</nav>

<main>
  <div class="profile-card">
    <div class="avatar" id="studentAvatar"></div>
    <div class="profile-info">
      <h1 id="studentName"></h1>
      <p  id="studentSubtitle"></p>
      <div class="profile-badges" id="badgeList"></div>
    </div>
    <div class="level-badge-hero">
      <div class="level-badge-hero-label">Overall Level</div>
      <div class="level-badge-hero-val" id="levelBadgeVal"></div>
    </div>
  </div>

  <div class="preferences-section" id="preferencesSection"></div>

  <div class="proficiency-card" id="proficiencyCard"></div>

  <div class="card motivation-card" id="motivationCard"></div>

  <div class="card match-card" id="matchCard"></div>

  <div class="cta-section" id="ctaSection"></div>
</main>

<script>
  async function loadData() {
    try {
      const res = await fetch('data/student-dashboard-data.json', { cache: 'no-cache' });
      if (!res.ok) throw new Error(`Status ${res.status}`);
      render(await res.json());
    } catch (e) {
      console.error(e);
      document.querySelector('main').innerHTML = `
        <div class="card" style="max-width:480px;margin:64px auto;text-align:center;">
          <h2 style="margin-bottom:12px;">Unable to load dashboard data</h2>
          <p style="color:var(--text-muted);">Ensure <code>data/student-dashboard-data.json</code> is served from an HTTP server.</p>
        </div>`;
    }
  }

  function render({ student, preferences, assessment, motivation, tutorMatch }) {
    renderProfile(student, assessment);
    renderPreferences(preferences);
    renderProficiency(assessment);
    renderMotivation(motivation);
    renderTutorMatch(tutorMatch);
    renderCTA(tutorMatch);
  }

  // ── Profile ──────────────────────────────────────────────────────────────
  function renderProfile(student, assessment) {
    document.getElementById('studentAvatar').textContent = initials(student.name);
    document.getElementById('studentName').textContent   = student.name;
    document.getElementById('levelBadgeVal').textContent = assessment.overallLevel;

    const parts = [];
    if (student.nativeLanguage) parts.push(`Native: ${student.nativeLanguage}`);
    if (student.targetLanguage) parts.push(`Learning ${student.targetLanguage}`);
    if (student.onboardedAt)    parts.push(`Onboarded ${student.onboardedAt}`);
    document.getElementById('studentSubtitle').textContent = parts.join(' · ');

    const badgeList = document.getElementById('badgeList');
    (student.badges || []).forEach(b => {
      const el = document.createElement('span');
      el.className = 'badge';
      el.textContent = `${b.icon} ${b.label}`;
      badgeList.appendChild(el);
    });
  }

  // ── Preferences ──────────────────────────────────────────────────────────
  function renderPreferences(prefs) {
    const section = document.getElementById('preferencesSection');

    const days  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const slots = ['Morning','Afternoon','Evening'];
    const avail = prefs.scheduling.availability || {};

    const availHTML = `
      <div class="avail-wrapper">
        <div class="pref-group-title">Availability</div>
        <div class="avail-grid">
          <div></div>
          ${days.map(d => `<div class="avail-day-label">${d}</div>`).join('')}
          ${slots.map(slot => `
            <div class="avail-row-label">${slot.slice(0,3)}</div>
            ${days.map(day => {
              const active = avail[day] && avail[day].includes(slot);
              return `<div class="avail-slot${active ? ' active' : ''}"></div>`;
            }).join('')}
          `).join('')}
        </div>
      </div>`;

    const blocks = [
      {
        icon: '🎯', title: 'Learning Goals', bg: 'var(--pink-light)',
        chipClass: 'pref-chip-goal',
        chips: [
          { icon: '🏆', text: prefs.goals.goal },
          { icon: '✨', text: prefs.goals.inspiration },
          { icon: '📚', text: prefs.goals.topicFocus },
          { icon: '⏱️', text: prefs.goals.timeline },
        ],
        extra: ''
      },
      {
        icon: '👩‍🏫', title: 'Tutor Preferences', bg: 'var(--blue-light)',
        chipClass: 'pref-chip-tutor',
        chips: [
          { icon: '🌍', text: prefs.tutor.country },
          ...(prefs.tutor.otherLanguages || []).map(l => ({ icon: '💬', text: `Speaks ${l}` })),
          ...(prefs.tutor.teachingStyle  || []).map(s => ({ icon: '⭐', text: s })),
        ],
        extra: ''
      },
      {
        icon: '📅', title: 'Schedule & Budget', bg: 'var(--purple-light)',
        chipClass: 'pref-chip-schedule',
        chips: [
          { icon: '💰', text: prefs.scheduling.budget },
          { icon: '🔁', text: `${prefs.scheduling.lessonsPerWeek}x per week` },
          { icon: '⏰', text: prefs.scheduling.sessionDuration },
        ],
        extra: availHTML
      }
    ];

    section.innerHTML = '';

    blocks.forEach(block => {
      const chipsHTML = block.chips.map(c =>
        `<span class="pref-chip ${block.chipClass}"><span>${c.icon}</span>${c.text}</span>`
      ).join('');

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-title">
            <div class="card-title-icon" style="background:${block.bg};">${block.icon}</div>
            ${block.title}
          </div>
          <button class="edit-btn">✏️ Edit</button>
        </div>
        <div class="pref-chips">${chipsHTML}</div>
        ${block.extra}
      `;
      section.appendChild(card);
    });
  }

  // ── Proficiency ───────────────────────────────────────────────────────────
  function renderProficiency(assessment) {
    const card = document.getElementById('proficiencyCard');

    const lvlClass = levelClass(assessment.overallLevel);

    const skillsHTML = (assessment.skills || []).map((s, i) => `
      <div class="skill-row">
        <div class="skill-header">
          <span class="skill-name">${s.icon} ${s.name}</span>
          <span class="skill-level-chip ${levelClass(s.level)}">${s.level}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" data-width="${s.score}"
            style="background:linear-gradient(90deg,${s.color}99,${s.color});transition-delay:${i * 0.15}s;"></div>
        </div>
      </div>`).join('');

    const strengthsHTML = (assessment.strengths || []).map(s => `
      <div class="insight-item strengths-item">
        <span class="insight-item-icon">${s.icon}</span>
        <span>${s.text}</span>
      </div>`).join('');

    const improvementsHTML = (assessment.improvements || []).map(s => `
      <div class="insight-item improvements-item">
        <span class="insight-item-icon">${s.icon}</span>
        <span>${s.text}</span>
      </div>`).join('');

    card.innerHTML = `
      <div class="proficiency-header">
        <div class="proficiency-title">
          <div class="proficiency-title-icon">🧠</div>
          <div>
            Your Proficiency Assessment
            <div class="proficiency-title-sub">Based on your AI conversation</div>
          </div>
        </div>
        <span class="overall-level-badge ${lvlClass}">${assessment.overallLevel}</span>
      </div>
      <div class="skill-grid">${skillsHTML}</div>
      <div class="assessment-insights">
        <div>
          <div class="insight-section-title strengths-title">✨ What you do well</div>
          <div class="insight-items">${strengthsHTML}</div>
        </div>
        <div>
          <div class="insight-section-title improvements-title">🚀 Areas to grow</div>
          <div class="insight-items">${improvementsHTML}</div>
        </div>
      </div>
    `;

    requestAnimationFrame(() => setTimeout(() => {
      card.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.width + '%'; });
    }, 200));
  }

  // ── Motivation ───────────────────────────────────────────────────────────
  function renderMotivation(motivation) {
    const card = document.getElementById('motivationCard');

    const tagsHTML = (motivation.tags || []).map(t =>
      `<span class="motivation-tag"><span>${t.icon}</span>${t.label}</span>`
    ).join('');

    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">
          <div class="card-title-icon" style="background:var(--pink-light);">🎯</div>
          Your Goals & Motivation
        </div>
      </div>
      <div class="motivation-quote">${motivation.quote}</div>
      <div class="motivation-tags">${tagsHTML}</div>
      <div class="motivation-meta">
        <div class="motivation-meta-item">
          <div class="motivation-meta-key">Timeline</div>
          <div class="motivation-meta-val">${motivation.timeline}</div>
        </div>
        <div class="motivation-meta-item">
          <div class="motivation-meta-key">Urgency</div>
          <div class="motivation-meta-val">${motivation.urgency}</div>
        </div>
        <div class="motivation-meta-item">
          <div class="motivation-meta-key">Motivation type</div>
          <div class="motivation-meta-val">${motivation.type}</div>
        </div>
      </div>
    `;
  }

  // ── Tutor Match ───────────────────────────────────────────────────────────
  function renderTutorMatch(match) {
    const card = document.getElementById('matchCard');
    const colors = ['#ff5ba4', '#3b82f6', '#10b981'];

    const tutorCardsHTML = (match.tutors || []).map((t, i) => `
      <div class="tutor-card">
        <div class="tutor-card-top">
          <div class="tutor-avatar" style="background:${colors[i % colors.length]};">${initials(t.name)}</div>
          <div>
            <div class="tutor-name">${t.name}</div>
            <div class="tutor-country">${t.country}</div>
          </div>
        </div>
        <div class="tutor-rating">
          <span class="tutor-stars">★</span>
          <span class="tutor-rating-val">${t.rating}</span>
          <span class="tutor-rating-count">(${t.reviews} reviews)</span>
        </div>
        <div class="tutor-tags">
          <span class="tutor-tag">${t.specialty}</span>
          ${t.speaksLanguage ? `<span class="tutor-tag tutor-tag-lang">💬 ${t.speaksLanguage}</span>` : ''}
        </div>
        <div>
          <span class="tutor-price">${t.price}</span>
          <span class="tutor-price-sub"> / lesson</span>
        </div>
      </div>`).join('');

    card.innerHTML = `
      <div class="match-header-row">
        <div class="match-count-text">
          We found <span class="match-count-num">${match.count}</span> tutors matching your profile
        </div>
      </div>
      <div class="tutor-cards">${tutorCardsHTML}</div>
    `;
  }

  // ── CTA ───────────────────────────────────────────────────────────────────
  function renderCTA(match) {
    document.getElementById('ctaSection').innerHTML = `
      <div class="cta-eyebrow">You are ready</div>
      <button class="cta-btn" onclick="alert('Opening Preply with your filters pre-applied...')">
        Find My Professor &rarr;
      </button>
      <div class="cta-sub">${match.count} tutors matched &middot; All filters pre-applied from your profile</div>
    `;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function levelClass(level) {
    const l = (level || '').toLowerCase();
    if (l === 'advanced')     return 'level-advanced';
    if (l === 'intermediate') return 'level-intermediate';
    return 'level-beginner';
  }

  function initials(name) {
    if (!name) return '';
    return name.split(/\s+/).filter(Boolean).map(p => p[0]).join('').substring(0, 2).toUpperCase();
  }

  loadData();
</script>

</body>
</html>
