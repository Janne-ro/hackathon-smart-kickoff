<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Onboard — Tutor Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #f25c95;
      --pink-light: #fef0f6;
      --pink-dark: #c73d78;
      --pink-mid: #f585b5;
      --gray-1: #f5f5f5;
      --blue-light: #eff6ff;
      --amber: #f59e0b;
      --amber-light: #fffbeb;
      --purple-light: #f5f3ff;
      --bg: #ffffff;
      --surface: #ffffff;
      --text: #000000;
      --text-muted: #6b6b6b;
      --border: #d0d0d0;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 22px; font-weight: 800; color: var(--text); text-decoration: none;
    }

    .nav-logo-dot {
      width: 28px; height: 28px;
      background: var(--pink); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 16px; font-weight: 800;
    }

    .nav-title { font-size: 15px; font-weight: 500; color: var(--text-muted); }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 64px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── PROFILE CARD ── */
    .profile-card {
      background: #ff7aac;
      border: 2px solid #121117;
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      align-items: center;
      gap: 28px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .profile-card::after {
      content: ''; position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.07); border-radius: 50%;
    }

    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(255,255,255,0.4); border: 3px solid rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; flex-shrink: 0;
      color: #000000;
    }

    .profile-info h1 { font-size: 22px; font-weight: 700; color: #000000; margin-bottom: 4px; }
    .profile-info p  { font-size: 14px; color: #333333; margin-bottom: 14px; }

    .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; }

    .badge {
      background: rgba(70,85,255,0.12); border: 1px solid rgba(70,85,255,0.35);
      border-radius: 20px; padding: 4px 12px;
      font-size: 13px; font-weight: 500; color: #000000;
      display: flex; align-items: center; gap: 5px;
    }

    /* ── RETENTION HERO ── */
    .retention-hero {
      /* background: linear-gradient(135deg, #8b1a4a 0%, #6b1238 60%, #4a0d28 100%); */
      background: #e0faf6;
      border: 2px solid #121117;
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .retention-hero::before {
      content: ''; position: absolute;
      top: -80px; right: -80px; width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(242,92,149,0.15) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    .retention-hero::after {
      content: ''; position: absolute;
      bottom: -60px; left: -60px; width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    .retention-hero-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 36px; position: relative; z-index: 1;
    }

    .retention-hero-title {
      font-size: 20px; font-weight: 700; color: #121117;
      display: flex; align-items: center; gap: 12px;
    }

    .retention-hero-title-icon {
      width: 38px; height: 38px;
      background: rgba(242,92,149,0.2); border: 1px solid rgba(242,92,149,0.35);
      border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px;
    }

    .retention-hero-subtitle {
      font-size: 14px; color: rgba(18,17,23,0.75); font-weight: 400; margin-top: 3px;
    }

    .retention-label-badge {
      padding: 7px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
    }

    .retention-label-high   { background: #166534; color: #bbf7d0; border: 1px solid #14532d; }
    .retention-label-medium { background: rgba(245,158,11,0.18);  color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
    .retention-label-low    { background: rgba(239,68,68,0.18);   color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }

    .retention-rings {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 36px; position: relative; z-index: 1; flex-wrap: wrap;
    }

    .retention-ring-item {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      flex: 1; min-width: 160px;
    }

    .retention-ring-wrap { position: relative; width: 130px; height: 130px; }
    .retention-ring-wrap svg { display: block; }

    .retention-ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .retention-ring-score { font-size: 32px; font-weight: 800; color: #121117; line-height: 1; }
    .retention-ring-pct   { font-size: 14px; color: rgba(18,17,23,0.8); font-weight: 500; }

    .retention-ring-label {
      font-size: 14px; font-weight: 600;
      color: #121117; text-align: center; max-width: 110px; line-height: 1.4;
    }

    .retention-ring-divider {
      width: 1px; height: 90px;
      background: rgba(18,17,23,0.3); align-self: center; flex-shrink: 0; margin: 0 8px;
    }

    .retention-signals {
      border-top: 2px solid rgba(18,17,23,0.35); padding-top: 28px;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      position: relative; z-index: 1;
    }

    .retention-signal-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(18,17,23,0.06); border: 1px solid rgba(18,17,23,0.25);
      border-radius: 10px; padding: 13px 14px;
      font-size: 14px; color: #121117; font-weight: 600;
    }

    .retention-signal-icon { font-size: 20px; flex-shrink: 0; }

    /* ── SHARED CARD ── */
    .card {
      background: var(--surface); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 16px; font-weight: 700; color: var(--text);
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }

    .card-title-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }

    /* ── INSIGHTS ROW ── */
    .insights-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* Motivation */
    .motivation-goal-text {
      font-size: 15px; font-weight: 600; color: var(--text);
      line-height: 1.6; margin-bottom: 18px; padding: 14px 16px;
      background: var(--pink-light); border-left: 3px solid var(--pink);
      border-radius: 0 8px 8px 0;
    }

    .motivation-meta { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }

    .motivation-meta-row {
      display: flex; justify-content: space-between; align-items: center; font-size: 14px;
    }

    .motivation-meta-key { color: var(--text-muted); font-weight: 500; }
    .motivation-meta-val { font-weight: 700; color: var(--text); }

    .motivation-tags { display: flex; gap: 8px; flex-wrap: wrap; }

    .motivation-tag {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 13px; background: var(--pink-light); color: var(--pink-dark);
      border-radius: 20px; font-size: 13px; font-weight: 600;
    }

    /* Sentiment */
    .sentiment-overview { display: flex; gap: 10px; margin-bottom: 20px; }

    .sentiment-chip {
      flex: 1; background: var(--gray-1); border-radius: 10px; padding: 12px; text-align: center;
    }

    .sentiment-chip-val { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
    .sentiment-chip-key { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    .sentiment-signals { display: flex; flex-direction: column; gap: 14px; margin-bottom: 16px; }
    .sentiment-signal-row { display: flex; flex-direction: column; gap: 5px; }

    .sentiment-signal-header {
      display: flex; align-items: center; justify-content: space-between; font-size: 13px;
    }

    .sentiment-signal-name {
      display: flex; align-items: center; gap: 6px; font-weight: 600; color: var(--text);
    }

    .sentiment-signal-val { font-weight: 700; color: var(--pink); }

    .sentiment-notes {
      font-size: 13px; color: var(--text-muted); line-height: 1.65;
      padding: 11px 13px; background: var(--gray-1); border-radius: 8px; font-style: italic;
    }

    /* Progress bars */
    .bar-track { height: 7px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 999px; width: 0%; transition: width 1s cubic-bezier(0.4,0,0.2,1); }

    /* ── TUTOR BRIEF ── */
    .tutor-brief-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 28px; box-shadow: var(--shadow); border-top: 3px solid var(--pink);
    }

    .brief-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }

    .brief-section-title {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px;
    }

    .focus-list { display: flex; flex-direction: column; gap: 9px; }

    .focus-item { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }

    .focus-item-icon {
      width: 28px; height: 28px; background: var(--pink-light); border-radius: 7px;
      display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0;
    }

    .brief-text-box {
      font-size: 14px; color: var(--text); line-height: 1.65;
      padding: 13px 14px; background: var(--gray-1); border-radius: 8px;
    }

    .brief-text-box.warn {
      background: #fffbeb; border-left: 3px solid var(--amber); color: #78350f;
    }

    .ai-summary-box {
      background: linear-gradient(135deg, var(--pink-light), #f3f0ff);
      border: 1px solid var(--pink-mid); border-radius: 12px;
      padding: 18px 22px; display: flex; align-items: flex-start; gap: 14px;
    }

    .ai-summary-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }

    .ai-summary-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--pink-dark); margin-bottom: 6px;
    }

    .ai-summary-text { font-size: 14px; color: var(--text); line-height: 1.7; }

    /* ── SKILL ASSESSMENT ── */
    .skill-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 18px 40px;
    }

    .skill-row  { display: flex; flex-direction: column; gap: 6px; }
    .skill-header { display: flex; align-items: center; justify-content: space-between; }

    .skill-name {
      font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 7px;
    }

    .skill-meta { display: flex; align-items: center; gap: 8px; }
    .skill-pct  { font-size: 14px; font-weight: 700; }

    .skill-cefr {
      font-size: 12px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
      background: var(--pink-light); color: var(--pink-dark);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .insights-section { grid-template-columns: 1fr; }
      .brief-grid { grid-template-columns: 1fr; }
      .retention-signals { grid-template-columns: repeat(2, 1fr); }
      .retention-ring-divider { display: none; }
      .skill-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .profile-card { flex-direction: column; text-align: center; }
      .profile-badges { justify-content: center; }
      main { padding: 16px 12px 48px; }
      .retention-hero { padding: 24px 16px; }
      .retention-hero-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .retention-signals { grid-template-columns: 1fr 1fr; }
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .profile-card     { animation: fadeUp 0.5s ease both; animation-delay: 0.00s; }
    .retention-hero   { animation: fadeUp 0.5s ease both; animation-delay: 0.07s; }
    .insights-section { animation: fadeUp 0.5s ease both; animation-delay: 0.14s; }
    .tutor-brief-card { animation: fadeUp 0.5s ease both; animation-delay: 0.20s; }
    .skill-card       { animation: fadeUp 0.5s ease both; animation-delay: 0.26s; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">
    <div class="nav-logo-dot">P</div>
    Smart Onboard
  </a>
  <span class="nav-title">Tutor Dashboard</span>
</nav>

<main>

  <!-- Profile -->
  <div class="profile-card">
    <div class="avatar" id="studentAvatar"></div>
    <div class="profile-info">
      <h1 id="studentName"></h1>
      <p id="studentSubtitle"></p>
      <div class="profile-badges" id="badgeList"></div>
    </div>
  </div>

  <!-- Retention Prediction (principal feature) -->
  <div class="retention-hero" id="retentionHero"></div>

  <!-- Motivation + Sentiment -->
  <div class="insights-section">
    <div class="card" id="motivationCard"></div>
    <div class="card" id="sentimentCard"></div>
  </div>

  <!-- Tutor Pre-Lesson Brief -->
  <div class="tutor-brief-card" id="tutorBriefCard"></div>

  <!-- Skill Assessment -->
  <div class="card skill-card">
    <div class="card-title">
      <div class="card-title-icon" style="background: var(--purple-light);">📊</div>
      Skill Assessment
    </div>
    <div class="skill-grid" id="skillGrid"></div>
  </div>

</main>

<script>
  async function loadDashboardData() {
    try {
      const response = await fetch("data/dashboard-data.json", { cache: "no-cache" });
      if (!response.ok) throw new Error(`Request failed with status ${response.status}`);
      renderDashboard(await response.json());
    } catch (error) {
      console.error('Failed to load dashboard data:', error);
      displayDataError();
    }
  }

  function renderDashboard({ student, onboarding }) {
    if (!student) throw new Error('Student data missing');
    populateProfile(student);
    renderRetentionHero(onboarding?.retention);
    renderMotivation(onboarding?.motivation);
    renderSentiment(onboarding?.sentiment);
    renderTutorBrief(onboarding?.tutorBrief);
    renderSkillGrid(student.skills || []);
  }

  // ── Profile ──────────────────────────────────────────────────────
  function populateProfile(student) {
    const avatar    = document.getElementById('studentAvatar');
    const nameEl    = document.getElementById('studentName');
    const subtitle  = document.getElementById('studentSubtitle');
    const badgeList = document.getElementById('badgeList');

    const initials = deriveInitials(student.name);
    if (avatar)   avatar.textContent = initials;
    if (nameEl)   nameEl.textContent = `Student Name: ${student.name || '—'}`;

    if (subtitle) {
      const parts = [];
      if (student.nativeLanguage)  parts.push(`Native: ${student.nativeLanguage}`);
      if (student.targetLanguage)  parts.push(`Learning ${student.targetLanguage}`);
      if (student.onboardedAt)     parts.push(`Onboarded ${student.onboardedAt}`);
      subtitle.textContent = parts.join(' · ');
    }

    if (badgeList) {
      badgeList.innerHTML = '';
      (student.badges || []).forEach(badge => {
        const el = document.createElement('span');
        el.className = 'badge';
        el.textContent = `${badge.icon || ''} ${badge.label || ''}`;
        badgeList.appendChild(el);
      });
    }
  }

  // ── Retention Hero ────────────────────────────────────────────────
  function renderRetentionHero(retention) {
    const container = document.getElementById('retentionHero');
    if (!container || !retention) return;

    const labelClass  = `retention-label-${(retention.label || 'medium').toLowerCase()}`;
    const circumference = 2 * Math.PI * 48;

    const ringsHTML = (retention.timeline || []).map((item, i) => {
      const isLast = i === retention.timeline.length - 1;
      return `
        <div class="retention-ring-item">
          <div class="retention-ring-wrap">
            <svg width="130" height="130" viewBox="0 0 130 130">
              <circle cx="65" cy="65" r="48" fill="none" stroke="rgba(18,17,23,0.15)" stroke-width="11"/>
              <circle cx="65" cy="65" r="48" fill="none" stroke="${item.color}" stroke-width="11"
                stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"
                stroke-linecap="round" transform="rotate(-90 65 65)"
                data-target-offset="${circumference * (1 - item.score / 100)}"
                style="transition:stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1) ${i * 0.25}s"/>
            </svg>
            <div class="retention-ring-center">
              <span class="retention-ring-score">${item.score}</span>
              <span class="retention-ring-pct">%</span>
            </div>
          </div>
          <span class="retention-ring-label">${item.label}</span>
        </div>
        ${!isLast ? '<div class="retention-ring-divider"></div>' : ''}
      `;
    }).join('');

    const signalsHTML = (retention.signals || []).map(s => `
      <div class="retention-signal-item">
        <span class="retention-signal-icon">${s.icon}</span>
        <span>${s.text}</span>
      </div>
    `).join('');

    container.innerHTML = `
      <div class="retention-hero-header">
        <div class="retention-hero-title">
          <div class="retention-hero-title-icon">🧠</div>
          <div>
            AI Retention Prediction
            <div class="retention-hero-subtitle">Probability the student continues learning after each milestone</div>
          </div>
        </div>
        <span class="retention-label-badge ${labelClass}">${retention.label} Retention</span>
      </div>
      <div class="retention-rings">${ringsHTML}</div>
      <div class="retention-signals">${signalsHTML}</div>
    `;

    requestAnimationFrame(() => setTimeout(() => {
      container.querySelectorAll('[data-target-offset]').forEach(c => {
        c.style.strokeDashoffset = c.dataset.targetOffset;
      });
    }, 150));
  }

  // ── Motivation ────────────────────────────────────────────────────
  function renderMotivation(motivation) {
    const card = document.getElementById('motivationCard');
    if (!card || !motivation) return;

    const tagsHTML = (motivation.tags || []).map(t =>
      `<span class="motivation-tag"><span>${t.icon}</span>${t.label}</span>`
    ).join('');

    card.innerHTML = `
      <div class="card-title">
        <div class="card-title-icon" style="background:var(--pink-light);">🎯</div>
        Motivation & Goals
      </div>
      <div class="motivation-goal-text">"${motivation.goals}"</div>
      <div class="motivation-meta">
        <div class="motivation-meta-row">
          <span class="motivation-meta-key">Motivation type</span>
          <span class="motivation-meta-val">${motivation.type}</span>
        </div>
        <div class="motivation-meta-row">
          <span class="motivation-meta-key">Timeline</span>
          <span class="motivation-meta-val">${motivation.timeline}</span>
        </div>
        <div class="motivation-meta-row">
          <span class="motivation-meta-key">Urgency</span>
          <span class="motivation-meta-val">${motivation.urgency}</span>
        </div>
      </div>
      <div class="motivation-tags">${tagsHTML}</div>
    `;
  }

  // ── Sentiment ─────────────────────────────────────────────────────
  function renderSentiment(sentiment) {
    const card = document.getElementById('sentimentCard');
    if (!card || !sentiment) return;

    const signalsHTML = (sentiment.signals || []).map(s => `
      <div class="sentiment-signal-row">
        <div class="sentiment-signal-header">
          <span class="sentiment-signal-name"><span>${s.icon}</span>${s.label}</span>
          <span class="sentiment-signal-val">${s.value}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill sentiment-bar" data-width="${s.value}"
            style="background:linear-gradient(90deg,var(--pink-mid),var(--pink));"></div>
        </div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="card-title">
        <div class="card-title-icon" style="background:var(--blue-light);">💬</div>
        Sentiment & Engagement
      </div>
      <div class="sentiment-overview">
        <div class="sentiment-chip">
          <div class="sentiment-chip-val">${sentiment.overall}</div>
          <div class="sentiment-chip-key">Overall Sentiment</div>
        </div>
        <div class="sentiment-chip">
          <div class="sentiment-chip-val">${sentiment.engagement}</div>
          <div class="sentiment-chip-key">Engagement Level</div>
        </div>
      </div>
      <div class="sentiment-signals">${signalsHTML}</div>
      <div class="sentiment-notes">${sentiment.notes}</div>
    `;

    requestAnimationFrame(() => setTimeout(() => {
      card.querySelectorAll('.sentiment-bar').forEach(b => { b.style.width = b.dataset.width + '%'; });
    }, 250));
  }

  // ── Tutor Brief ───────────────────────────────────────────────────
  function renderTutorBrief(brief) {
    const card = document.getElementById('tutorBriefCard');
    if (!card || !brief) return;

    const focusHTML = (brief.suggestedFocus || []).map(f => `
      <div class="focus-item">
        <div class="focus-item-icon">${f.icon}</div>
        <span>${f.text}</span>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="card-title">
        <div class="card-title-icon" style="background:var(--purple-light);">📋</div>
        Tutor Pre-Lesson Brief
      </div>
      <div class="brief-grid">
        <div>
          <div class="brief-section-title">Suggested Focus Areas</div>
          <div class="focus-list">${focusHTML}</div>
        </div>
        <div>
          <div class="brief-section-title">Icebreaker</div>
          <div class="brief-text-box">${brief.icebreaker}</div>
        </div>
        <div>
          <div class="brief-section-title">Watch Out For</div>
          <div class="brief-text-box warn">${brief.watchOut}</div>
        </div>
      </div>
      <div class="ai-summary-box">
        <span class="ai-summary-icon">🤖</span>
        <div>
          <div class="ai-summary-label">AI Summary</div>
          <div class="ai-summary-text">${brief.aiSummary}</div>
        </div>
      </div>
    `;
  }

  // ── Skill Grid ────────────────────────────────────────────────────
  function renderSkillGrid(skills) {
    const grid = document.getElementById('skillGrid');
    if (!grid || !Array.isArray(skills)) return;

    grid.innerHTML = '';
    skills.forEach(skill => {
      const row = document.createElement('div');
      row.className = 'skill-row';
      row.innerHTML = `
        <div class="skill-header">
          <span class="skill-name">${skill.icon || ''} ${skill.name || ''}</span>
          <span class="skill-meta">
            <span class="skill-pct" style="color:${skill.color || 'var(--text)'}">${skill.score ?? '—'}%</span>
            <span class="skill-cefr">${skill.cefr || ''}</span>
          </span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" data-width="${skill.score ?? 0}"
            style="background:linear-gradient(90deg,${skill.color || '#f25c95'}99,${skill.color || '#f25c95'});"></div>
        </div>
      `;
      grid.appendChild(row);
    });

    requestAnimationFrame(() => setTimeout(() => {
      grid.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.width + '%'; });
    }, 200));
  }

  // ── Error ─────────────────────────────────────────────────────────
  function displayDataError() {
    const main = document.querySelector('main');
    if (main) main.innerHTML = `
      <div class="card" style="max-width:480px;margin:64px auto;text-align:center;">
        <h2 style="margin-bottom:12px;">Unable to load dashboard data</h2>
        <p style="color:var(--text-muted);">Ensure <code>data/dashboard-data.json</code> is served from an HTTP server.</p>
      </div>
    `;
  }

  function deriveInitials(name) {
    if (!name) return '';
    return name.split(/\s+/).filter(Boolean).map(p => p[0]).join('').substring(0, 2).toUpperCase();
  }

  loadDashboardData();
</script>

</body>
</html>
